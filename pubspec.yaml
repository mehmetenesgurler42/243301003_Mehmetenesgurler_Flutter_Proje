name: premium_supabase_app
description: Kan bağışı talepleri ve bağışçıları buluşturan Flutter uygulaması. Supabase destekli.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  animate_do: ^3.3.4
  provider: ^6.1.2
  glassmorphism: ^3.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # To use Google Fonts offline, you would download them and add them here.
  # For now, we rely on the package fetching them.
